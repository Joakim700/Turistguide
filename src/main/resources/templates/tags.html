<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <meta charset="UTF-8">
    <title>Tags</title>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div th:each="tag : ${tags}">
    <p th:text="${tag.name()}"></p>
</div>

</body>
</html>

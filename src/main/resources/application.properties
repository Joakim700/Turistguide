# Applikations navn og profil
spring.application.name=Turistguide
spring.profiles.active=dev

# Database forbindelse (H2 i hukommelsen)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# SQL Indstillinger (Vigtigt for at 'schema.sql' virker)
spring.sql.init.mode=always
spring.datasource.generate-unique-name=false

# H2 Console (sĺ du kan se data pĺ http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.location=classpath:db/schema.sql,classpath:db/data.sql

# Logging sĺ du kan se dine SQL-kald i konsollen
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE


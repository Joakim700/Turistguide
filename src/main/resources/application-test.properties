# Database forbindelse (H2 i hukommelsen)
spring.datasource.url=jdbc:h2:mem:svampebob_firkant
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# SQL Indstillinger (Vigtigt for at 'schema.sql' virker)
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:src/test/resources/db/schema-test.sql
spring.sql.init.data-locations=file:src/test/resources/db/data-test.sql

spring.h2.console.enabled=true
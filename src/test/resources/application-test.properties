# Database forbindelse (H2 i hukommelsen)
spring.datasource.url=jdbc:h2:mem:svampebob_firkant;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.data-locations=classpath:h2init.sql
spring.sql.init.mode=always
spring.h2.console.enabled=true